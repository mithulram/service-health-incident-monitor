services:
  - type: web
    name: service-health-incident-monitor
    runtime: python
    plan: free
    buildCommand: python -m pip install --upgrade pip && python -m pip install .
    startCommand: uvicorn service_monitor.app:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /healthz
    envVars:
      - key: DEMO_MODE
        value: "false"
      - key: ADMIN_API_KEY
        sync: false
      - key: WEB_CORS_ORIGINS
        sync: false
      - key: DATABASE_URL
        sync: false
