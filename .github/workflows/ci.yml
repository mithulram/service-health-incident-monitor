name: verify

on:
  push:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install project
        run: python -m pip install --upgrade pip && python -m pip install '.[test]'
      - name: Compile source
        run: python -m compileall -q src tests scripts alembic
      - name: Run tests
        run: python -m unittest discover -s tests -v

  postgres:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: monitor
          POSTGRES_PASSWORD: ci_test_password
          POSTGRES_DB: service_monitor_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      PGHOST: localhost
      PGPORT: 5432
      PGUSER: monitor
      PGPASSWORD: ci_test_password
      PGDATABASE: service_monitor_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install project with Postgres driver
        run: python -m pip install --upgrade pip && python -m pip install '.[test,postgres]'
      - name: Wait for Postgres
        run: |
          python - <<'PY'
          import os
          import time

          import psycopg

          conninfo = {
              "host": os.environ["PGHOST"],
              "port": int(os.environ["PGPORT"]),
              "user": os.environ["PGUSER"],
              "password": os.environ["PGPASSWORD"],
              "dbname": os.environ["PGDATABASE"],
              "connect_timeout": 3,
          }
          for attempt in range(1, 31):
              try:
                  with psycopg.connect(**conninfo):
                      pass
                  print(f"Postgres ready after {attempt} attempt(s)")
                  break
              except Exception as exc:
                  print(f"Waiting for Postgres ({attempt}/30): {type(exc).__name__}")
                  time.sleep(2)
          else:
              raise SystemExit("Postgres did not become ready in time")
          PY
      - name: Compile source
        run: python -m compileall -q src tests scripts alembic
      - name: Run Alembic migrations against Postgres
        run: |
          export DATABASE_URL="postgresql+psycopg://${PGUSER}:${PGPASSWORD}@${PGHOST}:${PGPORT}/${PGDATABASE}"
          alembic upgrade head
      - name: Run Postgres integration tests
        run: |
          unset DATABASE_URL
          python -m unittest discover -s tests -p 'test_postgres_migrations.py' -v
      - name: Run unit tests against Postgres
        run: |
          unset DATABASE_URL
          shopt -s nullglob
          for test_file in tests/test_*.py; do
            base_name="$(basename "${test_file}")"
            case "${base_name}" in
              test_smoke_self_host.py|test_postgres_migrations.py) continue ;;
            esac
            echo "Running ${base_name} against Postgres"
            python -m unittest discover -s tests -p "${base_name}" -v
          done

  docker-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create smoke-test environment
        run: |
          cp .env.example .env
          python - <<'PY'
          from pathlib import Path

          path = Path(".env")
          lines = path.read_text(encoding="utf-8").splitlines()
          replacements = {
              "ADMIN_API_KEY": "ci-smoke-admin-key",
              "DEMO_MODE": "false",
              "SCHEDULER_ENABLED": "false",
              "ALERTS_ENABLED": "false",
          }
          output = []
          seen = set()
          for line in lines:
              if "=" in line and not line.lstrip().startswith("#"):
                  key = line.split("=", 1)[0]
                  if key in replacements:
                      output.append(f"{key}={replacements[key]}")
                      seen.add(key)
                      continue
              output.append(line)
          for key, value in replacements.items():
              if key not in seen:
                  output.append(f"{key}={value}")
          path.write_text("\n".join(output) + "\n", encoding="utf-8")
          PY

      - name: Build and start Docker Compose stack
        run: docker compose up -d --build

      - name: Run self-host smoke test
        env:
          BACKEND_URL: http://127.0.0.1:8090
          ADMIN_API_KEY: ci-smoke-admin-key
          SMOKE_WAIT_SECONDS: "15"
        run: python3 scripts/smoke_self_host.py

      - name: Show container logs on failure
        if: failure()
        run: docker compose logs --no-color

      - name: Stop Docker Compose stack
        if: always()
        run: docker compose down -v
