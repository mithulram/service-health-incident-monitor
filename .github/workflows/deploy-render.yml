name: Deploy to Render

on:
  workflow_dispatch:

concurrency:
  group: deploy-render-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install project
        run: python -m pip install --upgrade pip && python -m pip install '.[test]'

      - name: Compile source
        run: python -m compileall -q src tests scripts

      - name: Run tests
        run: python -m unittest discover -s tests -v

      - name: Trigger Render deploy
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "${RENDER_DEPLOY_HOOK_URL}" ]; then
            echo "RENDER_DEPLOY_HOOK_URL secret is not configured."
            exit 1
          fi
          curl -fsS -X POST "${RENDER_DEPLOY_HOOK_URL}"
          echo "Render deploy hook triggered successfully."
